# =============================================================================
# WorkStation — Endpoint Registry
# =============================================================================
# Copy to endpoints.yaml before running CLI tools or smoke tests.
# This file is the single source of truth for service URLs used by
# workstation_cli, health scripts, and tests.
#
# 9router has been removed from the architecture. See
# docs/architecture/adr/0001-remove-9router.md for rationale.
# =============================================================================

version: "1"

services:

  switchboard:
    url: "http://localhost:20401"
    health_path: "/health"
    description: "SwitchBoard execution-lane selector"

  status:
    url: "http://localhost:20400"
    health_path: "/health"
    description: "WorkStation stack-level status API"

# ── Timeouts (seconds) ────────────────────────────────────────────────────────
timeouts:
  connect: 3
  read: 10
