# =============================================================================
# WorkStation — Endpoint Registry
# =============================================================================
# Copy to endpoints.yaml before running CLI tools or smoke tests.
# This file is the single source of truth for service URLs used by
# workstation_cli, health scripts, and tests.
# =============================================================================

version: "1"

services:

  switchboard:
    url: "http://localhost:20401"
    health_path: "/health"
    # Full health endpoint: http://localhost:20401/health
    description: "SwitchBoard API gateway and policy layer"

  ninerouter:
    url: "http://localhost:20128"
    health_path: "/health"
    # Full health endpoint: http://localhost:20128/health
    description: "9router model dispatcher"

  status:
    url: "http://localhost:20400"
    health_path: "/health"
    description: "WorkStation stack-level status API"

# ── Timeouts (seconds) ────────────────────────────────────────────────────────
timeouts:
  connect: 3
  read: 10
