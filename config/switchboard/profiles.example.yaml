# =============================================================================
# SwitchBoard — Request Profiles (section 6.4)
# =============================================================================
# Compatibility-only archival example.
# The supported `/route` runtime is lane/backend-native and does not require
# operators to provision profile-era routing input files during normal setup.
# =============================================================================

version: "1"

# ── Profile definitions ───────────────────────────────────────────────────────
# Each profile describes a capability tier and exposes routing metadata that
# the selector can use when evaluating a `TaskProposal`.

profiles:

  # Standard balanced profile — good accuracy, moderate latency.
  standard:
    display_name: "Standard"
    description: "Balanced accuracy and speed for everyday tasks."
    routing_hint: "tier:standard"
    max_tokens: 4096
    timeout_ms: 20000

  # Fast profile — optimised for low-latency responses.
  fast:
    display_name: "Fast"
    description: "Low-latency model selection; may trade some accuracy for speed."
    routing_hint: "tier:fast"
    max_tokens: 2048
    timeout_ms: 8000

  # Power profile — highest-capability models.
  power:
    display_name: "Power"
    description: "Highest capability tier; use for complex reasoning tasks."
    routing_hint: "tier:power"
    max_tokens: 16384
    timeout_ms: 60000

  # Embedding profile — text embedding requests.
  embedding:
    display_name: "Embedding"
    description: "Text embedding requests routed to embedding-optimised models."
    routing_hint: "type:embedding"
    max_tokens: ~
    timeout_ms: 10000

# ── Default profile ───────────────────────────────────────────────────────────
# Used when no profile is specified in the request.
default_profile: standard

# ── Profile selection header ──────────────────────────────────────────────────
# Clients can request a profile by including this header.
profile_header: "X-WS-Profile"
