# =============================================================================
# WorkStation — aider_local lane configuration
# =============================================================================
# Copy to local_lane.yaml before enabling the lane.
# This file configures the local tiny-model execution lane used by Aider.
#
# The lane is intentionally local-first and constrained-hardware friendly.
# Both models below are small enough to run on a machine with 8 GB RAM.
#
# Quick start:
#   1. Copy this file to config/workstation/local_lane.yaml
#   2. Set lane.enabled to true
#   3. Start your model server (e.g. ollama serve)
#   4. Run: python -m workstation_cli lane status aider_local
# =============================================================================

lane:
  name: aider_local
  enabled: false          # set to true to activate the lane

  # Task classes this lane is suitable for. These are hints — SwitchBoard
  # uses them when selecting lanes, but WorkStation does not enforce them.
  task_classes:
    - lint_fix
    - simple_edit
    - documentation
    - test_fix


# Local model services backing this lane.
# Each entry is a separate inference endpoint. Add start_command if you want
# WorkStation to manage the server process; leave it null if the server is
# managed externally (e.g. Ollama as a system service).
#
# Recommended defaults for constrained hardware (8 GB RAM):
#   primary:   qwen2.5-coder:3b    (~2 GB RAM, CPU-practical, good at code tasks)
#   secondary: qwen2.5-coder:1.5b  (~1 GB RAM, lighter, faster inference)
#
# To list available models in Ollama: ollama list

models:
  - name: primary
    model_id: qwen2.5-coder:3b
    endpoint: "http://localhost:11434"
    health_path: "/api/tags"
    connect_timeout: 5
    read_timeout: 30
    # start_command: "ollama serve"   # uncomment to let WorkStation start Ollama
    # stop_command: null

  - name: secondary
    model_id: qwen2.5-coder:1.5b
    endpoint: "http://localhost:11434"
    health_path: "/api/tags"
    connect_timeout: 5
    read_timeout: 30
    # start_command: null
    # stop_command: null


# Health check behaviour
health_check:
  poll_interval_seconds: 30
  startup_timeout_seconds: 60
  consecutive_failures_before_unhealthy: 2


# Optional local filesystem paths used when WorkStation manages processes.
# Tilde (~) is not expanded here — use absolute paths if you need control.
runtime_paths:
  model_data_dir: "~/.workstation/models"
  logs_dir: "~/.workstation/logs/aider_local"
  pid_file: "~/.workstation/run/aider_local.pid"
