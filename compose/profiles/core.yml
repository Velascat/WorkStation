# =============================================================================
# WorkStation — Core Profile
# =============================================================================
# Minimal stack: SwitchBoard + 9router only.
# No observability or dev-tool services.
#
# Usage:
#   docker compose -f compose/docker-compose.yml \
#                  -f compose/profiles/core.yml up -d
# =============================================================================

version: "3.9"

services:

  switchboard:
    # Core profile keeps default image and resource constraints minimal.
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  ninerouter:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
