# =============================================================================
# WorkStation — Docker Compose (production / base)
# =============================================================================
# Usage:
#   docker compose -f compose/docker-compose.yml up -d
#
# For local overrides copy docker-compose.override.example.yml to
# docker-compose.override.yml and customise.
# =============================================================================

version: "3.9"

# ── Shared extension fields ───────────────────────────────────────────────────
x-restart-policy: &default-restart
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "5"

# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── SwitchBoard ─────────────────────────────────────────────────────────────
  switchboard:
    image: switchboard:latest
    container_name: workstation-switchboard
    <<: [*default-restart, *default-logging]
    ports:
      - "${PORT_SWITCHBOARD:-20401}:20401"
    environment:
      SWITCHBOARD_PORT: "20401"
      NINE_ROUTER_URL: "${NINE_ROUTER_URL:-http://ninerouter:20128}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - ../config/switchboard:/etc/switchboard:ro
    networks:
      - platform
    depends_on:
      ninerouter:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:20401/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 9router ──────────────────────────────────────────────────────────────────
  ninerouter:
    image: 9router:latest
    container_name: workstation-ninerouter
    <<: [*default-restart, *default-logging]
    ports:
      - "${PORT_9ROUTER:-20128}:20128"
    env_file:
      - ../config/9router/.env
    environment:
      NINE_ROUTER_PORT: "20128"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    networks:
      - platform
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:20128/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

# ─────────────────────────────────────────────────────────────────────────────
networks:
  platform:
    name: workstation-platform
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
volumes: {}
