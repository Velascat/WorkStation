# =============================================================================
# WorkStation — Docker Compose (production / base)
# =============================================================================
# Usage (from repo root):
#   docker compose -f compose/docker-compose.yml up -d
#
# Both services are built from source.  The build contexts assume SwitchBoard
# and 9router repos are checked out as siblings of WorkStation:
#
#   GitHub/
#     WorkStation/   ← this repo
#     SwitchBoard/   ← git clone https://github.com/Velascat/SwitchBoard
#     9router/       ← git clone https://github.com/decolua/9router
#
# For local overrides copy docker-compose.override.example.yml to
# docker-compose.override.yml and customise.
# =============================================================================

version: "3.9"

# ── Shared extension fields ───────────────────────────────────────────────────
x-restart-policy: &default-restart
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "5"

# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── SwitchBoard ─────────────────────────────────────────────────────────────
  switchboard:
    build:
      context: ../../SwitchBoard
      dockerfile: ../WorkStation/docker/Dockerfile.switchboard
    image: switchboard:latest
    container_name: workstation-switchboard
    <<: [*default-restart, *default-logging]
    ports:
      - "${PORT_SWITCHBOARD:-20401}:20401"
    environment:
      SWITCHBOARD_PORT: "20401"
      ROUTER9_BASE_URL: "${NINE_ROUTER_URL:-http://ninerouter:20128}"
      SWITCHBOARD_LOG_LEVEL: "${LOG_LEVEL:-info}"
    volumes:
      - ../config/switchboard:/etc/switchboard:ro
    networks:
      - platform
    depends_on:
      ninerouter:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:20401/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 9router ──────────────────────────────────────────────────────────────────
  ninerouter:
    build:
      context: ../../9router
      dockerfile: ../WorkStation/docker/Dockerfile.9router
    image: 9router:latest
    container_name: workstation-ninerouter
    <<: [*default-restart, *default-logging]
    ports:
      - "${PORT_9ROUTER:-20128}:20128"
    env_file:
      - ../config/9router/.env
    environment:
      PORT: "20128"
      HOSTNAME: "0.0.0.0"
    volumes:
      - ninerouter-data:/app/data
    networks:
      - platform
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:20128/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

# ─────────────────────────────────────────────────────────────────────────────
networks:
  platform:
    name: workstation-platform
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  ninerouter-data:
    name: workstation-ninerouter-data
