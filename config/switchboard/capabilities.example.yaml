# =============================================================================
# SwitchBoard — Model Capability Metadata
# =============================================================================
# Describes the capabilities and cost characteristics of models available
# through the stack. Used by SwitchBoard for profile resolution and by
# 9router for model selection when a routing_hint is provided.
#
# Copy to capabilities.yaml before starting the stack.
# =============================================================================

version: "1"

models:

  # ── Anthropic ────────────────────────────────────────────────────────────────

  claude-3-5-sonnet:
    provider: anthropic
    supports_tools: true
    supports_streaming: true
    quality: high
    cost_tier: medium
    context_window: 200000

  claude-3-haiku:
    provider: anthropic
    supports_tools: true
    supports_streaming: true
    quality: medium
    cost_tier: low
    context_window: 200000

  claude-3-opus:
    provider: anthropic
    supports_tools: true
    supports_streaming: true
    quality: highest
    cost_tier: high
    context_window: 200000

  # ── OpenAI ───────────────────────────────────────────────────────────────────

  gpt-4o:
    provider: openai
    supports_tools: true
    supports_streaming: true
    quality: high
    cost_tier: medium
    context_window: 128000

  gpt-4o-mini:
    provider: openai
    supports_tools: true
    supports_streaming: true
    quality: medium
    cost_tier: low
    context_window: 128000

  gpt-4-turbo:
    provider: openai
    supports_tools: true
    supports_streaming: true
    quality: highest
    cost_tier: high
    context_window: 128000

# ── Cost tier reference ───────────────────────────────────────────────────────
# low    — cheapest tier; suitable for high-volume, simple tasks
# medium — balanced cost and capability; default for most workloads
# high   — premium models; use for complex reasoning or critical tasks

# ── Quality reference ─────────────────────────────────────────────────────────
# medium  — capable for everyday tasks
# high    — strong reasoning, code, and instruction-following
# highest — state-of-the-art capability; slower and more expensive
