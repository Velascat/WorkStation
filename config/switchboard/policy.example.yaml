# =============================================================================
# SwitchBoard — Routing Policy (section 6.3)
# =============================================================================
# Copy to policy.yaml before starting the stack.
# This file defines how SwitchBoard evaluates canonical proposals and selects
# execution lanes.
# =============================================================================

version: "1"

# ── Routing rules ─────────────────────────────────────────────────────────────
# Rules are evaluated top-to-bottom; the first match wins.
rules:
  - name: docs_local
    when:
      task_type: documentation
      risk_level: low
    select_lane: aider_local
    select_backend: direct_local

  - name: code_default
    when:
      task_type: coding
    select_lane: claude_cli
    select_backend: kodo

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: "${LOG_LEVEL:-info}"
